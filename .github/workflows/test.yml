name: test

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,dashboard]"
      - run: python -m unittest discover -s tests -v
      - run: python -m agsure.cli --input sample_data/crops_synthetic.csv --commodity barley

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agsure}
      POSTGRES_USER: ${POSTGRES_USER:-agsure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agsure_postgres:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agsure} -d ${POSTGRES_DB:-agsure}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agsure_postgres:

